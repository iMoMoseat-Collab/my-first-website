backend:
  name: github
  repo: iMoMoseat-Collab/my-first-website
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "announcements"
    label: "ประกาศวันหยุด"
    files:
      - file: "index.html"
        label: "แก้ไขข้อความประกาศ"
        name: "announcement"
        fields:
          - {label: "ข้อความประกาศบนแถบสีทอง", name: "announcement-text", widget: "string"}
